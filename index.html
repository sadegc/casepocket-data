<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">

<title>CasePocket AU — 判决精读成品（双语）</title>
<style>
  :root{--bg:#f4f3ef;--surface:#fff;--ink:#1f1f1d;--muted:#6b6a65;--hint:#9a988f;--line:#e6e4dd;
    --fam:#0c447c;--fambg:#e6f1fb;--env:#085041;--envbg:#e1f5ee;--cp:#7a3a12;--cpbg:#faece2;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:#d9d7cf;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink);display:flex;justify-content:center;padding:20px;min-height:100vh;}
  .phone{width:392px;max-width:100%;background:var(--bg);border-radius:34px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.22);position:relative;height:840px;display:flex;flex-direction:column;}
  .status{height:30px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;font-size:12px;color:var(--muted);flex:0 0 auto;}
  .scroll,.dscroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .scroll::-webkit-scrollbar,.dscroll::-webkit-scrollbar,.chips::-webkit-scrollbar,.sheet::-webkit-scrollbar{display:none;}
  header{display:flex;align-items:center;justify-content:space-between;padding:8px 18px 14px;}
  .logo{display:flex;align-items:center;gap:8px;font-size:19px;font-weight:600;}
  .logo .mk{width:26px;height:26px;border-radius:8px;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;}
  .hicons{display:flex;gap:16px;color:var(--muted);font-size:19px;}
  .topbar{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-bottom:1px solid var(--line);background:var(--bg);}
  .brand{font-size:19px;font-weight:600;color:var(--ink);}
  .topacts{display:flex;gap:22px;}
  .topacts button{background:none;border:none;font-size:21px;line-height:1;color:var(--ink);cursor:pointer;padding:4px 2px;}
  .dot{position:relative;}.dot::after{content:"";position:absolute;top:-1px;right:-1px;width:7px;height:7px;border-radius:50%;background:#d8472f;}
  .chips{display:flex;gap:8px;padding:0 18px 12px;overflow-x:auto;}
  .chip{flex:0 0 auto;font-size:13px;padding:7px 15px;border-radius:20px;background:var(--surface);border:1px solid var(--line);color:var(--muted);cursor:pointer;}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink);}
  .banner{display:flex;align-items:center;gap:9px;margin:0 18px 16px;background:var(--fambg);border-radius:12px;padding:11px 14px;font-size:13px;color:var(--fam);}
  .feed{padding:0 18px 28px;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:15px 16px;margin-bottom:13px;cursor:pointer;transition:transform .08s;}
  .card:active{transform:scale(.99);}
  .crow{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
  .tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:6px;}
  .t-fam{background:var(--fambg);color:var(--fam);}.t-env{background:var(--envbg);color:var(--env);}
  .ago{font-size:12px;color:var(--hint);}
  .cname{font-size:15.5px;font-weight:600;line-height:1.35;margin-bottom:3px;}
  .ccit{font-size:11.5px;color:var(--hint);font-family:ui-monospace,Menlo,monospace;margin-bottom:9px;}
  .badge{display:inline-block;font-size:10.5px;font-weight:600;color:var(--cp);background:var(--cpbg);padding:2px 8px;border-radius:5px;margin-bottom:9px;}
  .csum{background:var(--bg);border-radius:11px;padding:10px 12px;}
  .csum .lab{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;}
  .csum p{font-size:13px;line-height:1.6;}
  .openbtn{margin-top:11px;width:100%;font-size:13px;font-weight:600;padding:9px;border-radius:10px;background:var(--ink);color:#fff;border:none;cursor:pointer;}
  nav{position:absolute;bottom:0;left:0;right:0;height:62px;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-around;font-size:22px;color:var(--hint);}
  nav .a{color:var(--ink);}
  #detail{position:absolute;inset:0;background:var(--bg);transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;z-index:5;}
  #detail.show{transform:translateX(0);}
  .dhead{flex:0 0 auto;display:flex;align-items:center;gap:10px;padding:13px 16px;background:var(--surface);border-bottom:1px solid var(--line);}
  .back{font-size:24px;color:var(--ink);cursor:pointer;background:none;border:none;line-height:1;}
  .dhttl{font-size:14px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .langbar{display:flex;gap:0;border:1px solid var(--line);border-radius:9px;overflow:hidden;flex:0 0 auto;}
  .langbar button{font-size:12.5px;font-weight:600;padding:6px 12px;border:none;background:var(--surface);color:var(--muted);cursor:pointer;}
  .langbar button.on{background:var(--ink);color:#fff;}
  .dscroll{padding:16px 18px 60px;}
  .dname{font-size:20px;font-weight:600;line-height:1.3;margin-bottom:6px;}
  .dcit{font-size:12.5px;color:var(--hint);font-family:ui-monospace,Menlo,monospace;margin-bottom:14px;}
  .meta{display:grid;grid-template-columns:auto 1fr;gap:7px 14px;font-size:13px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:18px;}
  .meta .k{color:var(--muted);}
  .idxhead{font-size:12.5px;color:var(--muted);margin:2px 0 12px;}
  .idxrow{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:9px;cursor:pointer;transition:transform .08s;}
  .idxrow:active{transform:scale(.99);}
  .iln{width:24px;height:24px;border-radius:7px;background:var(--bg);color:var(--muted);font-size:12px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;font-weight:600;}
  .ilc{flex:1;}.ilt{font-size:14.5px;font-weight:600;}.ilh{font-size:12px;color:var(--muted);margin-top:1px;}
  .ila{color:var(--hint);font-size:18px;}
  .secttl{font-size:17px;font-weight:600;margin-bottom:14px;}
  .secbody p{font-size:14.5px;line-height:1.78;}
  .prin .it{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:11px 14px;margin-bottom:8px;}
  .prin .pt{font-size:14px;font-weight:600;margin-bottom:3px;}
  .prin .pd{font-size:12.8px;line-height:1.62;color:var(--muted);}
  .quote{font-size:13.5px;line-height:1.7;border-left:3px solid var(--line);padding-left:12px;color:var(--ink);font-style:italic;margin:8px 0;}
  .pillrow{display:flex;flex-wrap:wrap;gap:8px;}
  .pill{font-size:13px;font-weight:600;padding:8px 13px;border-radius:10px;border:1px solid var(--line);background:var(--surface);cursor:pointer;display:flex;align-items:center;gap:6px;}
  .pill.leg{color:var(--env);background:var(--envbg);border-color:#cdeadf;}
  .pill.cse{color:var(--fam);background:var(--fambg);border-color:#cfe2f6;}
  .pill .ar{font-size:11px;opacity:.55;}
  .rstep{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:10px;}
  .rstep .rl{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px;}
  .cpbox{background:var(--cpbg);border:1px solid #efd9c8;border-radius:11px;padding:11px 13px;margin-top:9px;}
  .cpbox .cl{font-size:11px;font-weight:700;color:var(--cp);margin-bottom:4px;}
  .cpbox p{font-size:13px;line-height:1.64;color:#5c3318;}
  .ftbtn{width:100%;font-size:14px;font-weight:600;padding:12px;border-radius:12px;background:var(--surface);border:1px solid var(--line);color:var(--ink);cursor:pointer;}
  .ftwrap{display:none;margin-top:12px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:15px 16px;}
  .ftwrap.show{display:block;}
  .ftwrap pre{white-space:pre-wrap;font-family:inherit;font-size:13.5px;line-height:1.8;color:var(--ink);}
  .disc{font-size:11.5px;line-height:1.55;color:var(--hint);border-top:1px dashed var(--line);padding-top:12px;margin-top:18px;}
  .ov{position:absolute;inset:0;background:rgba(20,18,15,.45);z-index:10;display:none;align-items:flex-end;}
  .ov.show{display:flex;}
  .sheet{width:100%;background:var(--surface);border-radius:20px 20px 0 0;padding:18px 18px 26px;max-height:80%;overflow-y:auto;}
  .sgrab{width:38px;height:4px;border-radius:2px;background:var(--line);margin:0 auto 14px;}
  .sheet h4{font-size:16px;font-weight:600;margin-bottom:3px;}
  .sheet .scs{font-size:11.5px;color:var(--hint);font-family:ui-monospace,Menlo,monospace;margin-bottom:12px;}
  .sheet .blk{font-size:13.5px;line-height:1.7;margin-bottom:12px;}
  .sheet .ktag{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;}
  .sheet .src{font-size:12.5px;line-height:1.64;background:var(--bg);border-radius:10px;padding:10px 12px;font-style:italic;color:var(--muted);margin-bottom:12px;}
  .sheet a{color:var(--fam);font-size:13px;text-decoration:none;font-weight:600;}
  .notice{font-size:11.5px;line-height:1.55;color:var(--hint);background:var(--bg);border-radius:8px;padding:8px 10px;}
  .sumcard{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 15px;margin-bottom:18px;}
  .sumcard .sl{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;}
  .sumcard .sl2{font-size:11px;font-weight:700;color:var(--muted);margin:13px 0 5px;}
  .sumcard .sp{font-size:14px;line-height:1.7;}
  .legnums{display:flex;flex-wrap:wrap;gap:7px;}
  .lnum{font-size:12px;font-weight:600;color:var(--env);background:var(--envbg);border:1px solid #cdeadf;border-radius:7px;padding:4px 10px;font-family:ui-monospace,Menlo,monospace;}
  .actbox{white-space:pre-wrap;font-size:12.3px;line-height:1.55;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:11px 12px;color:var(--ink);margin-bottom:12px;}
body.dark{--bg:#15171a;--surface:#1e2126;--ink:#e9eaec;--muted:#9aa0a6;--hint:#787d83;--line:#2c3036;--fambg:#16242e;--envbg:#16241c;}
.fs-s .feed,.fs-s #dbody{zoom:.92}
.fs-l .feed,.fs-l #dbody{zoom:1.14}
.fs-xl .feed,.fs-xl #dbody{zoom:1.30}
.sheetx{float:right;border:none;background:transparent;font-size:19px;line-height:1;color:var(--muted);cursor:pointer;padding:2px 4px;margin:-2px -2px 0 0}
.setrow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 2px;border-bottom:1px solid var(--line)}
.setlbl{font-size:14.5px;font-weight:600;color:var(--ink)}
.segbtns{display:flex;gap:0;border:1px solid var(--line);border-radius:9px;overflow:hidden;flex:0 0 auto}
.segbtns button{font-size:12.5px;font-weight:600;padding:7px 12px;border:none;background:var(--surface);color:var(--muted);cursor:pointer}
.segbtns button.on{background:var(--ink);color:#fff}
.bmrow{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 13px;margin-bottom:10px;cursor:pointer}
.bmstar{cursor:pointer;font-size:15px;font-weight:600;color:var(--fam,#0c447c);display:inline-block;padding:4px 0}
.monthdiv{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:.04em;margin:14px 2px 8px}
.loadmore{text-align:center;padding:13px;margin:6px 0 12px;border:1px dashed var(--line);border-radius:12px;color:var(--muted);font-size:13px;cursor:pointer}
</style>
</head>

<script>let uiLang="zh";

        en:"⚠️ Quotations from the judgment are shown in italics and are faithful to the court's text; items marked 'CasePocket' are explanatory aids and examples, not part of the judgment. The judgment is the court's de-identified version; this app does not re-identify any party. 🔒 Family-law judgment: sharing is disabled under Part XIVB of the Family Law Act. Content is AI-organised and fidelity/completeness reviewed; not an official version and not legal advice."},

async function getCase(card){const key=(card&&card.contentId)||card;if(STORE.cases[key])return STORE.cases[key];if(_caseCache[key])return _caseCache[key];const rel=(card&&card.path)?card.path:('cases/'+key+'.json');const url=CONFIG.base+rel.split('/').map(encodeURIComponent).join('/')+_cb;const r=await fetch(url);if(!r.ok)throw new Error('http '+r.status);const j=await r.json();_caseCache[key]=j;return j;}
function needLeg(){return CONFIG.mode==='remote'&&(STORE.legIndex||[]).some(k=>!STORE.legislation[k]);}
async function ensureLeg(){if(CONFIG.mode!=='remote')return;for(const k of (STORE.legIndex||[])){if(!STORE.legislation[k]){const r=await fetch(CONFIG.base+'legislation/'+k+'.json'+_cb);if(!r.ok)throw new Error('http '+r.status);STORE.legislation[k]=await r.json();}}}

function toggleFT(){const w=document.getElementById('ftwrap');w.classList.toggle('show');const en=uiLang==='en';document.getElementById('ftlabel').textContent=w.classList.contains('show')?(en?'Close full judgment':'收起判决全文'):(en?'Open the full judgment (77 paras, original English)':'展开判决全文（英文原文）');}

const ov=document.getElementById('ov'),sheet=document.getElementById('sheet');
function legStatusHtml(k){const st=(curContent&&curContent.legStatus||{})[k];if(!st)return "";const c={repeal:["#fcecec","#a32d2d"],amend:["#faf0d8","#7a5a0b"],ok:["#e1f5ee","#085041"]}[st.level];return `<div style="background:${c[0]};border-radius:9px;padding:9px 11px;margin-bottom:12px"><div style="font-size:11px;font-weight:700;color:${c[1]};margin-bottom:3px">${uiLang==='en'?'STATUS · current law':'状态 · 现行法'}</div><div style="font-size:12.8px;line-height:1.6;color:${c[1]}">${st[uiLang]}</div></div>`;}
function openLeg(k){const L=curContent.legislation[k];const en=uiLang==='en';sheet.innerHTML=`<div class="sgrab"></div><button class="sheetx" onclick="closeSheet()">✕</button><h4>${L.t[uiLang]}</h4><div class="scs">${L.sc[uiLang]}</div>`+legStatusHtml(k)+`<div class="ktag">${en?'What it does':'条文作用'}</div><div class="blk">${L.desc[uiLang]}</div>`+(L.oldact?`<div class="ktag" style="color:#0c447c">${en?'Provision AS APPLIED in this case · FLA Comp. No.97 (28 Nov 2023 – 5 May 2024)':'条文 · 本案当年适用 · FLA 第 97 号汇编（2023-11-28 至 2024-05-05）'}</div><div class="actbox" style="border-color:#cfe2f6;background:#f2f7fd">${L.oldact[uiLang]}</div>`:``)+(L.act?`<div class="ktag">${en?'Provision · CURRENT · FLA Comp. No.101 (10 Jun 2025)':'条文 · 现行 · FLA 第 101 号汇编（2025-06-10）'}</div><div class="actbox">${L.act[uiLang]}</div>`:``)+(en?``:`<div style="font-size:11px;color:var(--hint);margin:-6px 0 12px">⚠ 中文为 CasePocket 翻译，仅供理解参考；法律以官方英文条文为准。</div>`)+`<div class="ktag">${en?'As cited here':'本案如何援引'}</div><div class="src">${L.src[uiLang]}</div>`+`<a href="https://www.legislation.gov.au/C2004A00275/latest/text" target="_blank">${en?'Official source · legislation.gov.au ›':'官方来源 · legislation.gov.au ›'}</a>`;ov.classList.add('show');}
function openCase(k){const C=curContent.cases[k];const en=uiLang==='en';sheet.innerHTML=`<div class="sgrab"></div><button class="sheetx" onclick="closeSheet()">✕</button><h4>${C.t[uiLang]}</h4><div class="scs">${C.sc[uiLang]} · ${C.court[uiLang]}</div>`+`<div class="ktag">${en?'What the case is about':'判例概要'}</div><div class="blk">${C.summary[uiLang]}</div>`+`<div class="ktag">${en?'Principle it stands for':'确立的原则'}</div><div class="blk">${C.prop[uiLang]}</div>`+(C.passage?`<div class="ktag">${en?'Key passage (judgment, English)':'判例关键段落（英文原文）'}</div><div class="actbox">${C.passage}</div>`:``)+`<div class="ktag">${en?('As cited in '+curCase.name):(curCase.name+' 如何引用')}</div><div class="src">${C.src[uiLang]}</div>`+`<div class="notice">${C.note[uiLang]}</div>`;ov.classList.add('show');}
function closeSheet(){ov.classList.remove('show');}
let curAct=null,curFlaPart=null;
function flaActs(){return STORE.legislation||{};}
function flaAll(){const L=flaActs();const o=[];Object.keys(L).forEach(k=>{(L[k].provisions||[]).forEach(p=>o.push(Object.assign({_actId:k,_act:L[k].act},p)));});return o;}
function flaEsc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function flaShell(){const en=uiLang==='en';dh.textContent=en?'Legislation':'法规速查';setLangBtns();
 dbody.innerHTML=`<input id="flaq" oninput="filterFLA()" placeholder="${en?'Search section number or keyword across all legislation…':'跨全部法规搜索条号或关键词…'}" style="width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:14px;margin:2px 0 12px;background:var(--surface);color:var(--ink)"><div id="flalist"></div>`;
 renderFLA('');detail.classList.add('show');dbody.scrollTop=0;}
async function openFLAList(){mode='flalist';curAct=null;curFlaPart=null;detail.classList.add('show');
 if(needLeg()){dh.textContent=uiLang==='en'?'Legislation':'法规速查';dbody.innerHTML=loadingHTML();try{await ensureLeg();}catch(e){dbody.innerHTML=errHTML();return;}}
 flaShell();}
function setAct(k){curAct=k;curFlaPart=null;const q=document.getElementById('flaq');if(q)q.value='';renderFLA('');dbody.scrollTop=0;}
function setFLAPart(p){curFlaPart=p;const q=document.getElementById('flaq');if(q)q.value='';renderFLA('');dbody.scrollTop=0;}
function structL(name,actId){if(uiLang==='en'||!name)return name;const a=flaActs()[actId];const m=a&&a.structZh;return (m&&m[name])||name;}
function flaRow(x,ctx){const en=uiLang==='en';const multi=Object.keys(flaActs()).length>1;return `<div class="idxrow" onclick="openFLAItem('${x.id}')"><div class="iln" style="width:auto;padding:0 8px;font-family:ui-monospace">${x.num}</div><div class="ilc"><div class="ilt">${x.title[uiLang]}</div>${ctx?`<div class="ilh">${multi?x._act[uiLang]+' · ':''}${structL(x.part,x._actId)}</div>`:''}</div><span class="ila">›</span></div>`;}
function renderFLA(q){const el=document.getElementById('flalist');if(!el)return;const en=uiLang==='en';
 if(q&&q.trim()){const qq=q.toLowerCase();const items=flaAll().filter(x=>((x.num+' '+x.title.en+' '+x.title.zh).toLowerCase()).includes(qq));
  el.innerHTML=items.map(x=>flaRow(x,true)).join('')||`<div style="font-size:13px;color:var(--hint);padding:10px">${en?'No match.':'无匹配条文。'}</div>`;return;}
 if(curAct&&curFlaPart){const items=flaAll().filter(x=>x._actId===curAct&&x.part===curFlaPart);
  let html=`<div class="idxrow" onclick="setFLAPart(null)"><div class="iln" style="width:auto;padding:0 8px">‹</div><div class="ilc"><div class="ilt">${en?'Back to Parts':'返回 · 全部编'}</div></div></div><div style="font-weight:800;font-size:14px;margin:12px 2px 8px">${structL(curFlaPart,curAct)}</div>`;
  let lastDiv='';items.forEach(x=>{if(x.div&&x.div!==lastDiv){lastDiv=x.div;html+=`<div style="font-size:12px;font-weight:700;color:var(--muted);margin:12px 2px 4px">${structL(x.div,curAct)}</div>`;}html+=flaRow(x,false);});
  el.innerHTML=html;return;}
 if(curAct){const a=flaActs()[curAct];const all=flaAll().filter(x=>x._actId===curAct);
  let html=`<div class="idxrow" onclick="setAct(null)"><div class="iln" style="width:auto;padding:0 8px">‹</div><div class="ilc"><div class="ilt">${en?'All legislation':'返回 · 全部法规'}</div></div></div><div style="font-weight:800;font-size:15px;margin:12px 2px 2px">${a.act[uiLang]}</div>`+(a.version?`<div style="font-size:11.5px;color:var(--hint);margin:0 2px 8px">${a.version[uiLang]}</div>`:'');
  const parts=[];const seen={};all.forEach(x=>{if(!seen[x.part]){seen[x.part]=1;parts.push(x.part);}});
  parts.forEach(p=>{const n=all.filter(x=>x.part===p).length;const pe=p.replace(/'/g,"\\'");html+=`<div class="idxrow" onclick="setFLAPart('${pe}')"><div class="iln" style="width:auto;padding:0 8px">§</div><div class="ilc"><div class="ilt">${structL(p,curAct)}</div><div class="ilh">${n} ${en?'sections':'条'}</div></div><span class="ila">›</span></div>`;});
  el.innerHTML=html;return;}
 // root: legislation grouped by category
 const acts=flaActs();const keys=Object.keys(acts);const cats={},order=[];
 keys.forEach(k=>{const c=(acts[k].category&&acts[k].category[uiLang])||(en?'Other':'其他');if(!cats[c]){cats[c]=[];order.push(c);}cats[c].push(k);});
 let html=`<div style="font-size:12.5px;color:var(--muted);margin:2px 2px 8px">${en?'Browse legislation — pick a law, then drill into Parts and sections. Or search across everything above.':'选择一部法律,再进入其编与条文;也可在上方跨全部法规搜索。'}</div>`;
 order.forEach(c=>{html+=`<div style="font-size:12px;font-weight:800;color:var(--muted);margin:14px 2px 6px;letter-spacing:.03em">${c}</div>`;
  cats[c].forEach(k=>{const a=acts[k];const n=(a.provisions||[]).length;html+=`<div class="idxrow" onclick="setAct('${k}')"><div class="iln" style="width:auto;padding:0 8px">§</div><div class="ilc"><div class="ilt">${a.act[uiLang]}</div><div class="ilh">${a.version?a.version[uiLang]+' · ':''}${n} ${en?'sections':'条'}</div></div><span class="ila">›</span></div>`;});});
 el.innerHTML=html;}
function filterFLA(){renderFLA(document.getElementById('flaq').value);}
function fmtLeg(t){return (t||'').split('\n').map(line=>{let ind=0;if(/^\(\d+[A-Z]?\)/.test(line))ind=1;else if(/^\([ivxl]+\)/.test(line))ind=3;else if(/^\([a-z]\)/.test(line))ind=2;return `<div style="margin-left:${ind*16}px;margin-bottom:4px">${flaEsc(line)}</div>`;}).join('');}
function openFLAItem(id){mode='flaitem';curFla=id;const x=flaAll().find(y=>y.id===id);if(!x)return;const en=uiLang==='en';dh.textContent=x.num;setLangBtns();
 const crumb=[flaActs()[x._actId]&&flaActs()[x._actId].act[uiLang],structL(x.part,x._actId),structL(x.div,x._actId),structL(x.subdiv,x._actId)].filter(Boolean).join(' › ');
 dbody.innerHTML=`<h3 class="secttl">${x.num} · ${x.title[uiLang]}</h3>`+(crumb?`<div class="src" style="margin:-4px 0 12px">${crumb}</div>`:'')+`<div class="ktag">${en?'Provision text · official (current compilation)':'条文文本 · 官方（现行汇编）'}</div><div class="actbox">${fmtLeg(x.text.en)}</div>`+`<a href="${(STORE.legislation[x._actId]&&STORE.legislation[x._actId].source)||'https://www.legislation.gov.au'}" target="_blank">${en?'Official source · legislation.gov.au ›':'官方来源 · legislation.gov.au ›'}</a>`;
 detail.classList.add('show');dbody.scrollTop=0;}

function tick(){const d=new Date();document.getElementById('clock').textContent=d.toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit',hour12:false});}
setInterval(tick,1000);tick();
async function bootFeed(){
 if(CONFIG.mode==='remote'&&(!STORE.manifest||!STORE.manifest.length)){
  feed.innerHTML='<div style="padding:48px 20px;text-align:center;color:var(--hint);font-size:13px">'+(uiLang==='en'?'Loading…':'加载中…')+'</div>';
  try{const r=await fetch(CONFIG.base+'manifest.json'+_cb);if(!r.ok)throw 0;STORE.manifest=await r.json();}
  catch(e){const en=uiLang==='en';feed.innerHTML='<div style="padding:40px 20px;text-align:center;font-size:13px"><div style="color:#a32d2d;margin-bottom:12px">'+(en?'Could not load cases — please connect to the internet.':'无法加载案件——请检查网络连接。')+'</div><button class="ftbtn" style="display:inline-block;width:auto;padding:8px 18px" onclick="bootFeed()">'+(en?'Retry':'重试')+'</button></div>';return;}
 }
 renderChips();render();if(zhScript==='trad')convAll();
}
function refreshContent(){if(CONFIG.mode!=='remote'){render();return;}_cb='?ts='+Date.now();STORE.manifest=[];for(const k in _caseCache)delete _caseCache[k];STORE.legislation={};feed.innerHTML='<div style="padding:40px;text-align:center;color:var(--hint);font-size:13px">'+(uiLang==='en'?'Refreshing…':'刷新中…')+'</div>';bootFeed();}
(function(){const home=document.getElementById('home');if(!home)return;let y0=0,pulling=false,pull=0;home.addEventListener('touchstart',function(e){if(home.scrollTop<=0){y0=e.touches[0].clientY;pulling=true;pull=0;}else pulling=false;},{passive:true});home.addEventListener('touchmove',function(e){if(pulling)pull=e.touches[0].clientY-y0;},{passive:true});home.addEventListener('touchend',function(){if(pulling&&pull>80)refreshContent();pulling=false;pull=0;},{passive:true});})();
applyPrefs();if(PREFS.lang)setLang(PREFS.lang);bootFeed();
</script>
</body>
