name: Build manifest

on:
  push:
    paths:
      - 'cases/**'
      - 'build-manifest.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Regenerate manifest.json from cases/
        run: node build-manifest.js
      - name: Commit if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add manifest.json
          git diff --staged --quiet || (git commit -m "Auto-update manifest from cases/" && git push)
